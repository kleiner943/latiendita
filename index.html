<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latiendita - Tu tienda de barrio</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --card: #111;
            --gold: #d4af37;
            --gold-dark: #b8960c;
            --text: #fff;
            --text2: #aaa;
            --border: #333;
            --whatsapp: #25D366;
            --danger: #ff4444;
            --success: #4CAF50;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            overflow-x: hidden;
        }

        @keyframes shimmer {
            0% { left: -100%; } 100% { left: 100%; }
        }
        @keyframes shine {
            to { background-position: 200% center; }
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(37,211,102,0.7); }
            70% { box-shadow: 0 0 0 20px rgba(37,211,102,0); }
        }
        @keyframes bounce {
            0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)}
        }

        header {
            background: linear-gradient(180deg, #0a0a0a 0%, #050505 100%);
            padding: 60px 20px 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
            border-bottom: 2px solid var(--gold);
        }
        header::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212,175,55,0.1), transparent);
            animation: shimmer 3s infinite;
        }
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 4rem;
            letter-spacing: 5px;
            background: linear-gradient(90deg, var(--gold), #fff, var(--gold));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shine 3s linear infinite;
            position: relative; z-index: 1;
        }
        header p {
            color: var(--gold);
            font-size: 1.2rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            position: relative; z-index: 1;
        }
        header .subtitle {
            color: var(--text2);
            font-size: 0.9rem;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        nav {
            position: sticky;
            top: 0;
            background: #0a0a0a;
            padding: 15px 20px;
            z-index: 100;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .nav-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--gold);
            text-decoration: none;
        }
        .cart-btn {
            background: none;
            border: 2px solid var(--border);
            color: var(--text);
            width: 50px; height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            position: relative;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cart-btn:hover { border-color: var(--gold); color: var(--gold); transform: scale(1.1); }
        .cart-count {
            position: absolute;
            top: -8px; right: -8px;
            background: var(--gold);
            color: #000;
            width: 24px; height: 24px;
            border-radius: 50%;
            font-size: 0.7rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .cart-count.active { animation: bounce 0.3s ease; }

        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 30px 20px;
            flex-wrap: wrap;
        }
        .filter-btn {
            background: transparent;
            border: 2px solid var(--border);
            color: var(--text2);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
        .filter-btn.active {
            background: linear-gradient(90deg, var(--gold), var(--gold-dark));
            color: #000;
            border-color: var(--gold);
            font-weight: 700;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px 60px; }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }
        .product-card {
            background: linear-gradient(145deg, #111, #1a1a1a);
            border-radius: 20px;
            padding: 20px;
            border: 2px solid var(--border);
            position: relative;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: fadeInUp 0.6s ease forwards;
            opacity: 0;
            display: flex;
            flex-direction: column;
        }
        .product-card:nth-child(1){animation-delay:0.05s} .product-card:nth-child(2){animation-delay:0.1s}
        .product-card:nth-child(3){animation-delay:0.15s} .product-card:nth-child(4){animation-delay:0.2s}
        .product-card:nth-child(5){animation-delay:0.25s} .product-card:nth-child(6){animation-delay:0.3s}
        .product-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--gold), #fff, var(--gold));
            transform: scaleX(0);
            transition: transform 0.4s;
            z-index: 2;
        }
        .product-card:hover::before { transform: scaleX(1); }
        .product-card:hover {
            transform: translateY(-12px);
            border-color: var(--gold);
            box-shadow: 0 20px 40px rgba(212,175,55,0.15);
        }
        .product-image {
            width: 100%;
            height: 180px;
            border-radius: 12px;
            background: #1a1a1a;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin-bottom: 15px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
        }
        .product-image:hover { transform: scale(1.03); }
        .product-image img {
            width: 100%; height: 100%;
            object-fit: cover;
            border-radius: 12px;
        }
        .product-image .placeholder-emoji {
            font-size: 5rem;
            opacity: 0.6;
        }
        .stock-badge {
            position: absolute;
            top: 8px; right: 8px;
            background: rgba(0,0,0,0.85);
            color: var(--gold);
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid var(--gold);
        }
        .stock-badge.low {
            color: var(--danger);
            border-color: var(--danger);
            animation: pulse 2s infinite;
        }
        .product-cat {
            color: var(--gold);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }
        .product-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .product-presentation {
            color: var(--text2);
            font-size: 0.8rem;
            margin-bottom: 12px;
        }
        .product-price {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--gold);
            margin-bottom: 15px;
        }
        .product-actions {
            margin-top: auto;
            display: flex;
            gap: 8px;
        }
        .btn-cart {
            flex: 1;
            background: linear-gradient(90deg, var(--gold), var(--gold-dark));
            color: #000;
            border: none;
            padding: 12px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .btn-cart:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(212,175,55,0.3); }
        .btn-cart.in-cart {
            background: var(--success);
            color: #fff;
        }
        .btn-whatsapp {
            background: var(--whatsapp);
            color: #fff;
            border: none;
            width: 42px; height: 42px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            flex-shrink: 0;
        }
        .btn-whatsapp:hover { transform: scale(1.15); box-shadow: 0 8px 20px rgba(37,211,102,0.5); }

        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            color: var(--gold);
            text-align: center;
            margin: 40px 0 30px;
            position: relative;
        }
        .section-title::after {
            content: '';
            position: absolute;
            bottom: -10px; left: 50%; transform: translateX(-50%);
            width: 60px; height: 3px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        .offers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .offer-card {
            background: linear-gradient(145deg, #1a1a0a, #0a0a05);
            border: 2px solid var(--gold);
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            transition: all 0.4s;
            position: relative;
            overflow: hidden;
        }
        .offer-card::before {
            content: '¡OFERTA!';
            position: absolute;
            top: 12px; right: -28px;
            background: var(--gold);
            color: #000;
            padding: 4px 35px;
            font-size: 0.65rem;
            font-weight: 700;
            transform: rotate(45deg);
            letter-spacing: 2px;
        }
        .offer-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(212,175,55,0.2); }
        .offer-name { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--gold); margin-bottom: 8px; }
        .offer-desc { color: var(--text2); font-size: 0.9rem; margin-bottom: 15px; }
        .offer-price { font-size: 2rem; font-weight: 700; margin-bottom: 5px; }
        .offer-save { color: var(--success); font-size: 0.85rem; margin-bottom: 15px; }
        .btn-offer {
            display: inline-block;
            background: var(--whatsapp);
            color: #fff;
            padding: 12px 25px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .btn-offer:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(37,211,102,0.4); }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: #000;
            padding: 15px 30px;
            border-radius: 30px;
            font-weight: 700;
            z-index: 400;
            animation: fadeInUp 0.3s ease;
            display: none;
        }
        .toast.show { display: block; }

        .whatsapp-float {
            position: fixed;
            bottom: 25px; right: 25px;
            background: linear-gradient(135deg, var(--whatsapp), #128C7E);
            color: #fff;
            width: 60px; height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            text-decoration: none;
            box-shadow: 0 5px 20px rgba(37,211,102,0.5);
            z-index: 200;
            animation: pulse 2s infinite;
            transition: all 0.3s;
        }
        .whatsapp-float:hover { transform: scale(1.15); }

        footer {
            background: #0a0a0a;
            text-align: center;
            padding: 40px 20px;
            border-top: 2px solid var(--border);
            position: relative;
        }
        footer::before {
            content: '';
            position: absolute;
            top: 0; left: 50%; transform: translateX(-50%);
            width: 150px; height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }
        .footer-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            background: linear-gradient(90deg, var(--gold), #fff, var(--gold));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shine 3s linear infinite;
        }
        footer p { color: #666; margin-top: 10px; font-size: 0.9rem; }

        @media (max-width: 600px) {
            header h1 { font-size: 2.5rem; letter-spacing: 2px; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 15px; }
            .product-card { padding: 15px; }
            .product-image { height: 130px; font-size: 3rem; }
            .product-name { font-size: 1rem; }
            .product-price { font-size: 1.3rem; }
            .btn-cart { font-size: 0.75rem; padding: 10px; }
        }
    </style>
</head>

    <script>
        // ==========================================

        // ==========================================
        const PRODUCTOS = [

            { id:9, nombre:"Croferos Fresa", corto:"Croferos Fresa", presentacion:"25G 180U", precio:0.25, stock:20, categoria:"Dulces", emoji:"🍓", imagen:"" },

            // BEBIDAS
            { id:11, nombre:"Coca-Cola 30ml", corto:"Coca 30ml", presentacion:"RCB (24)", precio:0.90, stock:50, categoria:"Bebidas", emoji:"🥤", imagen:"" },
            { id:12, nombre:"Coca-Cola 500ml", corto:"Coca 500ml", presentacion:"RCB (24)", precio:1.10, stock:40, categoria:"Bebidas", emoji:"🥤", imagen:"" },
            { id:13, nombre:"Coca-Cola 1000ml", corto:"Coca 1L", presentacion:"RCB (24)", precio:1.60, stock:30, categoria:"Bebidas", emoji:"🥤", imagen:"" },

            { id:16, nombre:"Palma Oro FDA GOB", corto:"Palma FDA", presentacion:"S1 C 15U", precio:1.00, stock:30, categoria:"Aceites", emoji:"🫒", imagen:"" },

            // LIMPIEZA
            { id:20, nombre:"Sanson Desinfectante Lavanda", corto:"Sanson Lavanda", presentacion:"250ml 24U", precio:0.95, stock:16, categoria:"Limpieza", emoji:"🧹", imagen:"" },
            { id:21, nombre:"Sanson Desinfectante Floral", corto:"Sanson Floral", presentacion:"250ml 24U", precio:0.95, stock:14, categoria:"Limpieza", emoji:"🌸", imagen:"" },

            { id:22, nombre:"Regla Margarina", corto:"Margarina 50G", presentacion:"50G 60U C6", precio:2.35, stock:5, categoria:"Alimentos", emoji:"🧈", imagen:"" },
            { id:23, nombre:"Maggi Salsa de Tomate", corto:"Salsa Tomate", presentacion:"42x170g", precio:0.86, stock:12, categoria:"Alimentos", emoji:"🍅", imagen:"" },
            { id:24, nombre:"Nescafé Gold Doypack", corto:"Nescafé Gold", presentacion:"75x175g", precio:0.86, stock:25, categoria:"Alimentos", emoji:"☕", imagen:"" }
        ];

        const OFERTAS = [
            { nombre:"🍪 3 Wafers Mix", desc:"Elige 3 Wafers (Pekes, Fresa, Choco o Vainilla)", precio:1.00, ahorro:0.35 },
            { nombre:"🥤 2 Cocas 500ml", desc:"Llévate 2 Coca-Colas de 500ml", precio:2.00, ahorro:0.20 },
            { nombre:"🍫 3 Croferos", desc:"Mezcla Choco, Coco y Fresa", precio:0.65, ahorro:0.10 },
            { nombre:"🫒 2 Palma Oro 350ml", desc:"Aceite Palma Oro tamaño familiar", precio:2.00, ahorro:0.30 }
        ];

        const TIENDA = {
            nombre: "Latiendita",
            whatsapp: "593986911774",
            direccion: "Eloy Alfaro y 7 de Noviembre, Paján",
            horario: "Lunes a Sábado 8AM-7PM"
        };

        // ==========================================
        // LÓGICA DEL CARRITO
        // ==========================================
        let carrito = [];

        function guardarCarrito() { localStorage.setItem('latiendita_cart', JSON.stringify(carrito)); }
        function cargarCarrito() { const c = localStorage.getItem('latiendita_cart'); if(c) carrito = JSON.parse(c); }

        function agregarAlCarrito(producto) {
            const existe = carrito.find(p => p.id === producto.id);
            if (existe) {
                if (existe.cantidad < producto.stock) existe.cantidad++;
                else { mostrarToast('⚠️ Stock máximo alcanzado'); return; }
            } else {
                carrito.push({ ...producto, cantidad: 1 });
            }
            guardarCarrito();
            actualizarUI();
            mostrarToast(`✅ ${producto.corto} agregado`);
        }

        function totalCarrito() {
            return carrito.reduce((sum, p) => sum + p.precio * p.cantidad, 0);
        }

        function irAWhatsApp() {
            if (carrito.length === 0) { mostrarToast('🛒 Agrega productos primero'); return; }
            let msg = 'Hola Latiendita! Quiero pedir:%0A%0A';
            carrito.forEach(p => {
                msg += `- ${p.cantidad}x ${p.nombre} ($${(p.precio * p.cantidad).toFixed(2)})%0A`;
            });
            msg += `%0A💰 Total: $${totalCarrito().toFixed(2)}%0A%0A`;
            window.open(`https://wa.me/${TIENDA.whatsapp}?text=${msg}`, '_blank');
        }

        // ==========================================
        // RENDERIZAR PRODUCTOS
        // ==========================================
        let filtroActual = 'Todos';

        function renderizarFiltros() {
            const categorias = ['Todos', ...new Set(PRODUCTOS.map(p => p.categoria))];
            document.getElementById('filters').innerHTML = categorias.map(cat =>
                `<button class="filter-btn ${filtroActual === cat ? 'active' : ''}" onclick="filtrar('${cat}')">${cat}</button>`
            ).join('');
        }

        function filtrar(cat) {
            filtroActual = cat;
            renderizarFiltros();
            renderizarProductos();
        }

        function renderizarProductos() {
            const grid = document.getElementById('productsGrid');
            const filtrados = filtroActual === 'Todos' ? PRODUCTOS : PRODUCTOS.filter(p => p.categoria === filtroActual);
            
            grid.innerHTML = filtrados.map(p => {
                const enCarrito = carrito.find(c => c.id === p.id);
                const stockClass = p.stock <= 5 ? 'low' : '';
                // Define la fuente de la imagen: si hay URL la usa, si no, muestra un emoji con fondo de color
                const imgContent = p.imagen 
                    ? `<img src="${p.imagen}" alt="${p.nombre}" loading="lazy">`
                    : `<span class="placeholder-emoji">${p.emoji}</span>`;
                
                return `
                <div class="product-card">
                    <div class="product-image">
                        ${imgContent}
                        <span class="stock-badge ${stockClass}">📦 ${p.stock}</span>
                    </div>
                    <div class="product-cat">${p.categoria}</div>
                    <div class="product-name">${p.corto}</div>
                    <div class="product-presentation">${p.presentacion}</div>
                    <div class="product-price">$${p.precio.toFixed(2)}</div>
                    <div class="product-actions">
                        <button class="btn-cart ${enCarrito ? 'in-cart' : ''}" onclick="agregarAlCarrito(PRODUCTOS[${p.id - 1}])">
                            ${enCarrito ? `✅ ${enCarrito.cantidad} en carrito` : '🛒 Agregar'}
                        </button>
                        <a href="https://wa.me/${TIENDA.whatsapp}?text=Hola!%20Quiero%20${encodeURIComponent(p.nombre)}%20-%20$${p.precio.toFixed(2)}" class="btn-whatsapp" target="_blank" title="Pedir directo">💬</a>
                    </div>
                </div>`;
            }).join('');
            
            renderizarCarrito();
        }

        function renderizarCarrito() {
            document.getElementById('cartCount').textContent = carrito.reduce((s, p) => s + p.cantidad, 0);
        }

        function renderizarOfertas() {
            document.getElementById('offersGrid').innerHTML = OFERTAS.map(o => `
                <div class="offer-card">
                    <div class="offer-name">${o.nombre}</div>
                    <div class="offer-desc">${o.desc}</div>
                    <div class="offer-price">$${o.precio.toFixed(2)}</div>
                    <div class="offer-save">Ahorras $${o.ahorro.toFixed(2)}</div>
                    <a href="https://wa.me/${TIENDA.whatsapp}?text=Hola!%20Quiero%20la%20oferta:%20${encodeURIComponent(o.nombre)}%20-%20$${o.precio.toFixed(2)}" class="btn-offer" target="_blank">💬 Pedir oferta</a>
                </div>
            `).join('');
        }

        function actualizarUI() {
            renderizarProductos();
            renderizarCarrito();
        }

        function mostrarToast(texto) {
            const toast = document.getElementById('toast');
            toast.textContent = texto;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ==========================================
        // INICIAR
        // ==========================================
        function iniciar() {
            cargarCarrito();
            renderizarFiltros();
            renderizarProductos();
            renderizarOfertas();
            renderizarCarrito();
        }

        iniciar();

        // ==========================================
        // INSTRUCCIONES PARA AGREGAR IMÁGENES:
        // 1. Toma una foto del producto.
        // 2. Súbela a un servicio como https://imgur.com/upload
        // 3. Copia el enlace directo (terminado en .jpg o .png)
        // 4. Pégalo en la propiedad "imagen" del producto.
        //    Ejemplo: { id:1, nombre:"...", imagen:"https://i.imgur.com/tu-imagen.jpg" }
        // ==========================================
    </script>
</body>
</html>
