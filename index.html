<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>La Tiendita - Tu tienda de barrio inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #0a0a0a; --bg2: #111; --card: #1a1a1a; --text: #fff;
            --text2: #aaa; --gold: #d4af37; --gold2: #b8960c; --gold3: #f0d060;
            --border: #2a2a2a; --green: #10b981; --red: #ef4444;
            --whatsapp: #25D366; --whatsapp2: #128C7E;
        }
        [data-theme="light"] {
            --bg: #f5f0e8; --bg2: #fff; --card: #fff; --text: #1a1a1a; --text2: #666; --border: #e0e0e0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg); color: var(--text);
            transition: all 0.3s; overflow-x: hidden;
        }

        /* LOADER */
        .loader-wrapper {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 10000;
        }
        .loader {
            width: 50px; height: 50px; border: 3px solid var(--border);
            border-top: 3px solid var(--gold); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* HEADER */
        header {
            background: linear-gradient(135deg, var(--bg2), var(--bg));
            padding: 30px 20px; text-align: center;
            border-bottom: 3px solid var(--gold); position: relative; overflow: hidden;
        }
        header::before {
            content: ''; position: absolute; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle, rgba(212,175,55,0.08) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .header-abuelos { font-size: 3rem; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        h1 {
            font-family: 'Playfair Display', serif; font-size: 3rem;
            background: linear-gradient(135deg, var(--gold), #fff, var(--gold));
            background-size: 200% auto; -webkit-background-clip: text;
            -webkit-text-fill-color: transparent; background-clip: text;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }
        .subtitle { color: var(--text2); font-size: 0.9rem; margin-top: 5px; }

        /* NAV */
        nav {
            position: sticky; top: 0; background: var(--bg2);
            padding: 10px 20px; display: flex; justify-content: space-between;
            align-items: center; z-index: 1000; border-bottom: 1px solid var(--border);
            backdrop-filter: blur(10px); flex-wrap: wrap; gap: 10px;
        }
        .nav-brand {
            font-family: 'Playfair Display', serif; font-size: 1.3rem;
            color: var(--gold); display: flex; align-items: center; gap: 8px; cursor: pointer;
        }
        .nav-controls { display: flex; gap: 10px; align-items: center; }
        .theme-toggle, .cart-toggle {
            background: var(--card); border: 1px solid var(--border); color: var(--text);
            width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
            font-size: 1.1rem; transition: all 0.3s; display: flex;
            align-items: center; justify-content: center; position: relative;
        }
        .theme-toggle:hover, .cart-toggle:hover { border-color: var(--gold); color: var(--gold); }
        .cart-badge {
            position: absolute; top: -6px; right: -6px;
            background: var(--red); color: white; font-size: 0.65rem;
            font-weight: bold; width: 20px; height: 20px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .cart-badge:empty { display: none; }

        /* SEARCH */
        .search-section { max-width: 900px; margin: 20px auto; padding: 0 20px; }
        .search-box { margin-bottom: 15px; }
        .search-input {
            width: 100%; padding: 14px 20px; border-radius: 50px;
            border: 2px solid var(--border); background: var(--card);
            color: var(--text); font-size: 1rem;
        }
        .search-input:focus { outline: none; border-color: var(--gold); }
        .filters { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .filter-btn {
            background: transparent; border: 2px solid var(--border);
            color: var(--text2); padding: 8px 18px; border-radius: 30px;
            cursor: pointer; transition: all 0.3s; font-size: 0.8rem;
        }
        .filter-btn:hover, .filter-btn.active {
            border-color: var(--gold); color: var(--gold);
            background: rgba(212,175,55,0.1);
        }

        /* MAIN LAYOUT */
        .main-layout {
            display: flex; max-width: 1400px; margin: 0 auto; padding: 0 20px 40px; gap: 20px;
        }
        .products-area { flex: 1; min-width: 0; }
        .section-title {
            font-family: 'Playfair Display', serif; font-size: 1.5rem;
            text-align: center; margin: 30px 0 20px; color: var(--gold);
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 15px;
        }
        .product-card {
            background: var(--card); border-radius: 16px; padding: 15px;
            border: 1px solid var(--border); transition: all 0.3s;
            position: relative; display: flex; flex-direction: column;
        }
        .product-card:hover { transform: translateY(-3px); border-color: var(--gold); }
        .product-image {
            width: 100%; height: 140px; background: var(--bg2);
            border-radius: 12px; display: flex; align-items: center;
            justify-content: center; font-size: 3rem; margin-bottom: 10px; overflow: hidden;
        }
        .product-image img { width: 100%; height: 100%; object-fit: cover; }
        .stock-badge {
            position: absolute; top: 8px; right: 8px;
            background: rgba(0,0,0,0.8); padding: 3px 8px;
            border-radius: 12px; font-size: 0.6rem; border: 1px solid var(--gold);
        }
        .stock-badge.low { border-color: var(--red); color: var(--red); }
        .product-category { color: var(--gold); font-size: 0.6rem; text-transform: uppercase; letter-spacing: 2px; }
        .product-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: bold; margin: 4px 0; }
        .product-price { font-size: 1.4rem; font-weight: bold; color: var(--gold); margin: 5px 0; }
        .btn-cart-add {
            width: 100%; background: linear-gradient(135deg, var(--gold), var(--gold2));
            color: black; border: none; padding: 10px; border-radius: 25px;
            cursor: pointer; font-weight: bold; font-size: 0.85rem; transition: all 0.3s; margin-top: auto;
        }
        .btn-cart-add:hover { transform: scale(1.02); box-shadow: 0 4px 12px rgba(212,175,55,0.3); }
        .btn-cart-add.in-cart { background: var(--green); }

        /* CARRITO SIDEBAR */
        .cart-sidebar {
            width: 350px; min-width: 350px;
            background: var(--bg2); border-radius: 16px;
            border: 1px solid var(--border); padding: 20px;
            position: sticky; top: 80px; max-height: calc(100vh - 100px);
            display: flex; flex-direction: column; transition: all 0.3s;
        }
        .cart-sidebar.hidden { display: none; }
        .cart-header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid var(--border);
        }
        .cart-title { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--gold); }
        .btn-vaciar {
            background: transparent; border: 1px solid var(--red); color: var(--red);
            padding: 5px 12px; border-radius: 15px; cursor: pointer; font-size: 0.7rem;
        }
        .cart-items { flex: 1; overflow-y: auto; margin-bottom: 15px; }
        .cart-item {
            display: flex; align-items: center; gap: 10px; padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .cart-item-emoji { font-size: 1.5rem; }
        .cart-item-info { flex: 1; }
        .cart-item-name { font-size: 0.8rem; font-weight: bold; }
        .cart-item-price { font-size: 0.75rem; color: var(--gold); }
        .cart-qty {
            display: flex; align-items: center; gap: 5px;
        }
        .qty-btn {
            width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border);
            background: var(--card); color: var(--text); cursor: pointer;
            font-size: 1rem; display: flex; align-items: center; justify-content: center;
        }
        .qty-btn:hover { border-color: var(--gold); }
        .qty-num { font-weight: bold; min-width: 20px; text-align: center; }
        .cart-item-remove { color: var(--red); cursor: pointer; font-size: 0.8rem; }
        .cart-total {
            font-size: 1.3rem; font-weight: bold; text-align: right;
            padding: 15px 0; border-top: 2px solid var(--gold);
        }
        .btn-comprar {
            width: 100%; background: linear-gradient(135deg, var(--whatsapp), var(--whatsapp2));
            color: white; border: none; padding: 14px; border-radius: 30px;
            cursor: pointer; font-weight: bold; font-size: 1rem; transition: all 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-comprar:hover { transform: scale(1.02); box-shadow: 0 4px 15px rgba(37,211,102,0.4); }
        .btn-comprar:disabled { opacity: 0.5; cursor: not-allowed; }
        .cart-empty {
            text-align: center; padding: 40px 20px; color: var(--text2);
        }
        .cart-empty-icon { font-size: 3rem; margin-bottom: 10px; }

        /* TOAST */
        .toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--gold); color: black; padding: 12px 24px;
            border-radius: 50px; font-weight: bold; z-index: 3000;
            display: none; animation: slideUp 0.3s ease;
        }
        @keyframes slideUp { from { transform: translateX(-50%) translateY(100px); } }
        .toast.show { display: block; }

        /* WHATSAPP FLOAT */
        .whatsapp-float {
            position: fixed; bottom: 20px; right: 20px;
            background: var(--whatsapp); width: 55px; height: 55px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: white; text-decoration: none;
            box-shadow: 0 5px 20px rgba(37,211,102,0.4); z-index: 100;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        footer {
            text-align: center; padding: 30px; background: var(--bg2);
            border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--text2);
        }

        /* MOBILE */
        @media (max-width: 900px) {
            .main-layout { flex-direction: column; }
            .cart-sidebar {
                position: fixed; bottom: 0; left: 0; right: 0; top: auto;
                width: 100%; min-width: 100%; max-height: 50vh;
                border-radius: 20px 20px 0 0; z-index: 2000;
                transform: translateY(100%); transition: transform 0.3s;
            }
            .cart-sidebar.open { transform: translateY(0); }
            .cart-toggle-mobile {
                display: flex !important;
                position: fixed; bottom: 20px; left: 20px; z-index: 2001;
                background: var(--gold); color: black; width: 50px; height: 50px;
                border-radius: 50%; align-items: center; justify-content: center;
                font-size: 1.3rem; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            }
            h1 { font-size: 2rem; }
            .products-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
            .product-card { padding: 10px; }
            .product-image { height: 100px; font-size: 2rem; }
            .product-name { font-size: 0.8rem; }
            .product-price { font-size: 1.1rem; }
            .btn-cart-add { padding: 8px; font-size: 0.75rem; }
        }
        @media (min-width: 901px) {
            .cart-toggle-mobile { display: none !important; }
        }
    </style>
</head>
<body>

<div class="loader-wrapper" id="loader"><div class="loader"></div></div>

<header>
    <div class="header-abuelos">👴🏻🏪👵🏻</div>
    <h1>La Tiendita</h1>
    <div class="subtitle">📍 Paján, Manabí · 🚗 Domicilio · ⭐ 4.9</div>
</header>

<nav>
    <div class="nav-brand">👴🏻🏪 <span>La Tiendita</span></div>
    <div class="nav-controls">
        <button class="theme-toggle" onclick="toggleTheme()" title="Modo claro/oscuro">🌙</button>
        <button class="cart-toggle" onclick="toggleCart()" title="Ver carrito">
            🛒 <span class="cart-badge" id="cartBadge"></span>
        </button>
    </div>
</nav>

<div class="search-section">
    <div class="search-box">
        <input type="text" class="search-input" id="searchInput" placeholder="🔍 Buscar productos..." oninput="buscarProductos()">
    </div>
    <div class="filters" id="filters"></div>
</div>

<div class="main-layout">
    <div class="products-area">
        <h2 class="section-title">🛒 Todos los Productos</h2>
        <div class="products-grid" id="productsGrid"></div>
    </div>
    <aside class="cart-sidebar hidden" id="cartSidebar">
        <div class="cart-header">
            <span class="cart-title">🛒 Tu Carrito</span>
            <button class="btn-vaciar" onclick="vaciarCarrito()">🗑️ Vaciar</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-total" id="cartTotal">Total: $0.00</div>
        <button class="btn-comprar" id="btnComprar" onclick="comprarPorWhatsApp()" disabled>
            💬 COMPRAR POR WHATSAPP
        </button>
    </aside>
</div>

<button class="cart-toggle-mobile" id="cartToggleMobile" onclick="toggleCart()">🛒</button>

<div class="toast" id="toast"></div>
<a href="https://wa.me/593986911774" class="whatsapp-float" target="_blank">💬</a>

<footer>
    <p>📍 Eloy Alfaro y 7 de Noviembre, Paján, Manabí</p>
    <p>📞 +593 98 691 1774 · ⏰ Lun-Sáb 8AM-7PM</p>
    <p>© 2026 La Tiendita - Atendemos con amor</p>
</footer>

<script>
    const PRODUCTOS_INICIALES = [
        { id: 1, codigo: "AMOR-PEK", nombre: "Amor Wafers Pekes", corto: "Wafer Pekes", precio: 0.65, stock: 30, categoria: "Dulces", emoji: "🍪", vendidos: 45 },
        { id: 2, codigo: "AMOR-FRE", nombre: "Amor Wafer Fresa", corto: "Wafer Fresa", precio: 0.65, stock: 25, categoria: "Dulces", emoji: "🍓", vendidos: 38 },
        { id: 3, codigo: "AMOR-CHO", nombre: "Amor Wafer Chocolate", corto: "Wafer Choco", precio: 0.65, stock: 20, categoria: "Dulces", emoji: "🍫", vendidos: 52 },
        { id: 4, codigo: "AMOR-VAI", nombre: "Amor Wafer Vainilla", corto: "Wafer Vainilla", precio: 0.65, stock: 20, categoria: "Dulces", emoji: "🍦", vendidos: 30 },
        { id: 5, codigo: "NES-COC", nombre: "Nestlé Galleta Coco", corto: "Galleta Coco", precio: 4.25, stock: 10, categoria: "Dulces", emoji: "🥥", vendidos: 15 },
        { id: 6, codigo: "NES-MIN", nombre: "Nest María Galleta Mini", corto: "María Mini", precio: 0.67, stock: 15, categoria: "Dulces", emoji: "🍘", vendidos: 60 },
        { id: 7, codigo: "CRO-CHO", nombre: "Croferos Chocolate", corto: "Croferos Choco", precio: 0.45, stock: 24, categoria: "Dulces", emoji: "🍫", vendidos: 80 },
        { id: 8, codigo: "CRO-COC", nombre: "Croferos Coco", corto: "Croferos Coco", precio: 0.45, stock: 18, categoria: "Dulces", emoji: "🥥", vendidos: 55 },
        { id: 9, codigo: "CRO-FRE", nombre: "Croferos Fresa", corto: "Croferos Fresa", precio: 0.45, stock: 20, categoria: "Dulces", emoji: "🍓", vendidos: 70 },
        { id: 10, codigo: "PRO-CHO", nombre: "Profers Chomax Avellana", corto: "Profers Avellana", precio: 1.85, stock: 6, categoria: "Dulces", emoji: "🌰", vendidos: 12 },
        { id: 11, codigo: "COC-30", nombre: "Coca-Cola 30ml", corto: "Coca 30ml", precio: 1.10, stock: 50, categoria: "Bebidas", emoji: "🥤", vendidos: 25 },
        { id: 12, codigo: "COC-500", nombre: "Coca-Cola 500ml", corto: "Coca 500ml", precio: 1.30, stock: 40, categoria: "Bebidas", emoji: "🥤", vendidos: 90 },
        { id: 13, codigo: "COC-1000", nombre: "Coca-Cola 1000ml", corto: "Coca 1L", precio: 1.80, stock: 30, categoria: "Bebidas", emoji: "🥤", vendidos: 65 },
        { id: 14, codigo: "PAL-ACH", nombre: "Palma Oro Achiote 200ml", corto: "Achiote 200ml", precio: 1.15, stock: 15, categoria: "Aceites", emoji: "🫒", vendidos: 20 },
        { id: 15, codigo: "PAL-350", nombre: "Palma Oro 350ml", corto: "Palma Oro", precio: 1.00, stock: 12, categoria: "Aceites", emoji: "🫒", vendidos: 35 },
        { id: 16, codigo: "MAG-SAL", nombre: "Maggi Salsa de Tomate", corto: "Salsa Tomate", precio: 1.00, stock: 12, categoria: "Alimentos", emoji: "🍅", vendidos: 32 },
        { id: 17, codigo: "REG-MAR", nombre: "Regla Margarina", corto: "Margarina", precio: 2.55, stock: 5, categoria: "Alimentos", emoji: "🧈", vendidos: 8 },
        { id: 18, codigo: "FID-AMA-SPA", nombre: "Fideos Amanda Spaghetti", corto: "Spaghetti", precio: 0.65, stock: 20, categoria: "Fideos", emoji: "🍝", vendidos: 30 },
        { id: 19, codigo: "DET-SUR-225", nombre: "Surf Detergente", corto: "Surf 225g", precio: 0.50, stock: 30, categoria: "Limpieza", emoji: "🧼", vendidos: 55 },
        { id: 20, codigo: "SAN-LAV", nombre: "Sanson Desinfectante Lavanda", corto: "Sanson Lavanda", precio: 0.50, stock: 16, categoria: "Limpieza", emoji: "🧹", vendidos: 22 },
    ];

    let productos = [];
    let carrito = [];
    let busquedaActual = '';
    let filtroActual = 'Todos';
    let cartVisible = window.innerWidth > 900;

    function cargarDatos() {
        const guardados = localStorage.getItem('latiendita_productos');
        productos = guardados ? JSON.parse(guardados) : [...PRODUCTOS_INICIALES];
        if (!guardados) guardarProductos();
        const carritoGuardado = localStorage.getItem('latiendita_carrito');
        carrito = carritoGuardado ? JSON.parse(carritoGuardado) : [];
    }

    function guardarProductos() { localStorage.setItem('latiendita_productos', JSON.stringify(productos)); }
    function guardarCarrito() { localStorage.setItem('latiendita_carrito', JSON.stringify(carrito)); actualizarUI(); }

    function mostrarToast(mensaje) {
        const toast = document.getElementById('toast');
        toast.textContent = mensaje; toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 1800);
    }

    function agregarAlCarrito(producto) {
        const existente = carrito.find(p => p.id === producto.id);
        if (existente) {
            if (existente.cantidad < producto.stock) existente.cantidad++;
            else { mostrarToast('⚠️ Stock máximo'); return; }
        } else {
            carrito.push({ ...producto, cantidad: 1 });
        }
        guardarCarrito();
        mostrarToast(`✅ ${producto.corto} agregado`);
    }

    function quitarDelCarrito(id) {
        const item = carrito.find(p => p.id === id);
        if (item && item.cantidad > 1) item.cantidad--;
        else carrito = carrito.filter(p => p.id !== id);
        guardarCarrito();
    }

    function sumarEnCarrito(id) {
        const item = carrito.find(p => p.id === id);
        if (item && item.cantidad < item.stock) { item.cantidad++; guardarCarrito(); }
    }

    function eliminarDelCarrito(id) {
        carrito = carrito.filter(p => p.id !== id);
        guardarCarrito();
    }

    function vaciarCarrito() {
        carrito = []; guardarCarrito(); mostrarToast('🗑️ Carrito vaciado');
    }

    function totalCarrito() {
        return carrito.reduce((total, p) => total + (p.precio * p.cantidad), 0);
    }

    function totalItems() {
        return carrito.reduce((s, p) => s + p.cantidad, 0);
    }

    function comprarPorWhatsApp() {
        if (carrito.length === 0) return;
        let mensaje = '🛒 *PEDIDO - LA TIENDITA* 🛒%0A%0A';
        carrito.forEach(p => {
            mensaje += `• ${p.cantidad}x ${p.nombre} - $${(p.precio * p.cantidad).toFixed(2)}%0A`;
        });
        mensaje += `%0A💰 *TOTAL: $${totalCarrito().toFixed(2)}*%0A%0A`;
        mensaje += `📍 Envío a: %0A💬 ¡Gracias! 🙏`;
        window.open(`https://wa.me/593986911774?text=${mensaje}`, '_blank');
    }

    function toggleCart() {
        const sidebar = document.getElementById('cartSidebar');
        if (window.innerWidth <= 900) {
            sidebar.classList.toggle('open');
        } else {
            cartVisible = !cartVisible;
            sidebar.classList.toggle('hidden', !cartVisible);
        }
    }

    function toggleTheme() {
        const theme = document.documentElement.getAttribute('data-theme');
        const btn = document.querySelector('.theme-toggle');
        if (theme === 'light') {
            document.documentElement.setAttribute('data-theme', 'dark');
            localStorage.setItem('theme', 'dark'); btn.innerHTML = '🌙';
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            localStorage.setItem('theme', 'light'); btn.innerHTML = '☀️';
        }
    }

    function buscarProductos() {
        busquedaActual = document.getElementById('searchInput').value.toLowerCase();
        renderizarProductos();
    }

    function filtrarPorCategoria(cat) {
        filtroActual = cat;
        renderizarFiltros();
        renderizarProductos();
    }

    function productosFiltrados() {
        let resultados = [...productos];
        if (filtroActual !== 'Todos') resultados = resultados.filter(p => p.categoria === filtroActual);
        if (busquedaActual) {
            resultados = resultados.filter(p =>
                p.nombre.toLowerCase().includes(busquedaActual) ||
                p.corto.toLowerCase().includes(busquedaActual) ||
                p.categoria.toLowerCase().includes(busquedaActual)
            );
        }
        return resultados;
    }

    function renderizarFiltros() {
        const categorias = ['Todos', ...new Set(productos.map(p => p.categoria))];
        document.getElementById('filters').innerHTML = categorias.map(cat =>
            `<button class="filter-btn ${filtroActual === cat ? 'active' : ''}" onclick="filtrarPorCategoria('${cat}')">${cat}</button>`
        ).join('');
    }

    function renderizarProductos() {
        const filtrados = productosFiltrados();
        const grid = document.getElementById('productsGrid');
        if (filtrados.length === 0) {
            grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--text2)">🔍 No se encontraron productos</div>';
            return;
        }
        grid.innerHTML = filtrados.map(p => {
            const enCarrito = carrito.find(c => c.id === p.id);
            return `
                <div class="product-card">
                    <div class="product-image"><span>${p.emoji}</span></div>
                    <div class="stock-badge ${p.stock <= 5 ? 'low' : ''}">📦 ${p.stock}</div>
                    <div class="product-category">${p.categoria}</div>
                    <div class="product-name">${p.corto}</div>
                    <div class="product-price">$${p.precio.toFixed(2)}</div>
                    <button class="btn-cart-add ${enCarrito ? 'in-cart' : ''}" onclick="agregarAlCarrito(productos.find(x=>x.id===${p.id}))">
                        ${enCarrito ? `✅ ${enCarrito.cantidad} en carrito` : '🛒 AGREGAR'}
                    </button>
                </div>`;
        }).join('');
    }

    function renderizarCarrito() {
        const itemsDiv = document.getElementById('cartItems');
        const totalDiv = document.getElementById('cartTotal');
        const btnComprar = document.getElementById('btnComprar');
        const badge = document.getElementById('cartBadge');
        
        const total = totalItems();
        badge.textContent = total > 0 ? total : '';

        if (carrito.length === 0) {
            itemsDiv.innerHTML = '<div class="cart-empty"><div class="cart-empty-icon">🛒</div><p>Tu carrito está vacío</p><p style="font-size:0.8rem">Agrega productos para empezar</p></div>';
            totalDiv.textContent = 'Total: $0.00';
            btnComprar.disabled = true;
            return;
        }

        itemsDiv.innerHTML = carrito.map(p => `
            <div class="cart-item">
                <span class="cart-item-emoji">${p.emoji}</span>
                <div class="cart-item-info">
                    <div class="cart-item-name">${p.corto}</div>
                    <div class="cart-item-price">$${(p.precio * p.cantidad).toFixed(2)}</div>
                </div>
                <div class="cart-qty">
                    <button class="qty-btn" onclick="quitarDelCarrito(${p.id})">−</button>
                    <span class="qty-num">${p.cantidad}</span>
                    <button class="qty-btn" onclick="sumarEnCarrito(${p.id})">+</button>
                </div>
                <span class="cart-item-remove" onclick="eliminarDelCarrito(${p.id})">🗑️</span>
            </div>
        `).join('');

        totalDiv.textContent = `Total: $${totalCarrito().toFixed(2)}`;
        btnComprar.disabled = false;
    }

    function actualizarUI() {
        renderizarProductos();
        renderizarCarrito();
    }

    function iniciar() {
        cargarDatos();
        renderizarFiltros();
        actualizarUI();
        
        const tema = localStorage.getItem('theme');
        if (tema === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.querySelector('.theme-toggle').innerHTML = '☀️';
        }

        if (window.innerWidth > 900) {
            document.getElementById('cartSidebar').classList.remove('hidden');
        }

        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
        }, 600);
    }

    window.addEventListener('resize', () => {
        const sidebar = document.getElementById('cartSidebar');
        if (window.innerWidth > 900) {
            sidebar.classList.remove('open');
            if (cartVisible) sidebar.classList.remove('hidden');
        }
    });

    iniciar();
</script>
</body>
</html>
